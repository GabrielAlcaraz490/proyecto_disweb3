:root{--bg:#071126;--panel:#0f1d3f;--panel-alt:#16294e;--surface:#142245;--text:#edf4ff;--muted:#9db4d8;--accent:#4d86ff;--accent-strong:#7db7ff;--danger:#5d8de6;--border:#ffffff14;--shadow:0 25px 60px #000a2361;--radius:22px;--font:"Segoe UI", Tahoma, Geneva, Verdana, sans-serif}*{box-sizing:border-box}html,body,#root{min-height:100%}body{min-height:100vh;color:var(--text);font-family:var(--font);background:radial-gradient(circle at top,#0f2d59 0%,#071126 35%);margin:0}#root{justify-content:center;padding:24px;display:flex}.app-shell{grid-template-columns:220px 1fr;gap:24px;width:100%;max-width:1320px;display:grid}.sidebar{border-radius:var(--radius);-webkit-backdrop-filter:blur(16px);backdrop-filter:blur(16px);background:linear-gradient(#4d86ff24,#0a122af2);border:1px solid #4d86ff2e;flex-direction:column;gap:14px;padding:20px;display:flex}.sidebar-btn{color:var(--text);cursor:pointer;background:0 0;border:1px solid #ffffff0f;border-radius:16px;align-items:center;gap:12px;padding:16px 18px;font-weight:700;transition:transform .2s,background .2s;display:flex}.sidebar-btn:hover,.sidebar-btn:focus-visible{background:#ffffff0f;transform:translate(4px)}.sidebar-btn span{font-size:18px}.main-panel{flex-direction:column;gap:20px;display:flex}.topbar{box-shadow:var(--shadow);background:linear-gradient(#23488ff0 0%,#0e182ff5 100%);border:1px solid #4d86ff24;border-radius:24px;justify-content:space-between;align-items:center;padding:20px 26px;display:flex}.topbar-logo{align-items:center;gap:16px;display:flex}.topbar-icon{font-size:28px;line-height:1}.topbar h1{letter-spacing:.06em;margin:0;font-size:24px}.topbar-label{color:var(--muted);margin:0;font-size:13px}.topbar-actions{gap:12px;display:flex}.icon-button{width:44px;height:44px;color:var(--text);cursor:pointer;background:#ffffff0a;border:1px solid #ffffff14;border-radius:16px;font-size:18px}.content-area{flex-direction:column;gap:20px;min-height:0;display:flex}.module-panel{box-shadow:var(--shadow);background:#0b172df5;border:1px solid #4d86ff1f;border-radius:28px;padding:28px}.module-header{justify-content:space-between;align-items:center;gap:20px;margin-bottom:24px;display:flex}.module-title{align-items:center;gap:14px;display:flex}.module-title .icon-label{background:#4d86ff2e;border-radius:18px;place-items:center;width:54px;height:54px;font-size:26px;display:grid}.module-title h2{margin:0;font-size:28px}.module-title p{color:var(--muted);margin:4px 0 0}.search-panel,.action-bar{flex-wrap:wrap;align-items:center;gap:14px;display:flex}.search-input,.input-field,.select-field{width:100%;min-width:180px;color:var(--text);background:#ffffff0f;border:1px solid #4d86ff2e;border-radius:16px;outline:none;padding:14px 16px}.input-field,.select-field{display:block}.input-group{flex-direction:column;gap:8px;display:flex}.input-group label{color:var(--muted);font-size:14px}.btn-primary,.btn-secondary,.btn-danger,.btn-outline{cursor:pointer;border:none;border-radius:16px;padding:14px 20px;font-weight:700;transition:transform .2s,opacity .2s}.btn-primary{color:#081126;background:linear-gradient(135deg,#4d86ff 0%,#80b5ff 100%)}.btn-secondary{color:var(--text);background:#ffffff0f;border:1px solid #4d86ff29}.btn-danger{color:#fff;background:#5d8de6}.btn-outline{color:var(--text);background:0 0;border:1px solid #4d86ff3d}.btn-primary:hover,.btn-secondary:hover,.btn-danger:hover,.btn-outline:hover{opacity:.95;transform:translateY(-1px)}.split-grid{grid-template-columns:320px minmax(0,1fr);gap:24px;display:grid}.form-card{background:#ffffff0d;border:1px solid #ffffff14;border-radius:24px;flex-direction:column;gap:18px;padding:22px;display:flex}.form-card h3{margin:0}.grid-cards{grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:18px;display:grid}.card,.table-panel{background:#ffffff0a;border:1px solid #ffffff14;border-radius:24px;padding:20px}.card{flex-direction:column;gap:12px;display:flex}.card h3,.table-panel h3{margin:0}.card p,.table-panel p{color:var(--muted);margin:0}.card-actions,.row-actions{flex-wrap:wrap;gap:10px;display:flex}.status-pill{color:var(--text);background:#4d86ff1f;border-radius:999px;padding:6px 12px;font-size:13px;display:inline-flex}.table-wrapper{overflow-x:auto}.data-table{border-collapse:collapse;width:100%;min-width:720px}.data-table th,.data-table td{text-align:left;border-bottom:1px solid #ffffff14;padding:14px 16px}.data-table th{color:var(--accent);letter-spacing:.05em;text-transform:uppercase;font-size:14px}.data-table tbody tr:hover{background:#ffffff0a}.message{color:var(--accent-strong);font-size:14px}@media (width<=980px){.app-shell,.split-grid{grid-template-columns:1fr}}
